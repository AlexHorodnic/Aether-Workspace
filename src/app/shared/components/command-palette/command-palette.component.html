@if (open()) {
  <div class="palette-backdrop" (click)="close()"></div>
  <section class="palette" role="dialog" aria-modal="true" aria-label="Command palette">
    <label class="palette-search">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20"><path d="M8.7 14.2a5.5 5.5 0 1 1 3.9-1.6l3.1 3.1" /></svg>
      </span>
      <input
        #searchInput
        type="text"
        [ngModel]="query()"
        (ngModelChange)="setQuery($event)"
        placeholder="Search conversations, prompts, and files..."
        aria-label="Command search"
      />
      <kbd>Esc</kbd>
    </label>

    <div class="palette-list" role="listbox" aria-label="Command results">
      @for (section of sections(); track section.title) {
        <section class="result-section" [attr.aria-label]="section.title">
          <h3>{{ section.title }}</h3>
          <div class="section-items">
            @for (entry of section.entries; track entry.item.id) {
              <button
                type="button"
                class="palette-item"
                [class.active]="entry.globalIndex === activeIndex()"
                (mouseenter)="setActive(entry.globalIndex)"
                (click)="runItem(entry.item)"
                role="option"
                [attr.aria-selected]="entry.globalIndex === activeIndex()"
              >
                <span class="item-icon" [attr.data-icon]="entry.item.icon" aria-hidden="true">
                  @switch (entry.item.icon) {
                    @case ('plus') {
                      <svg viewBox="0 0 20 20"><path d="M10 4v12M4 10h12" /></svg>
                    }
                    @case ('chat') {
                      <svg viewBox="0 0 20 20"><path d="M4.5 5.5h11v7.8h-5.7L6.4 16v-2.7H4.5z" /></svg>
                    }
                    @case ('prompt') {
                      <svg viewBox="0 0 20 20"><path d="M4.5 5.5h11M4.5 10h7M4.5 14.5h5" /></svg>
                    }
                    @case ('knowledge') {
                      <svg viewBox="0 0 20 20"><path d="M5 4.5h7l3 3v8H5zM12 4.5v3h3" /></svg>
                    }
                    @case ('settings') {
                      <svg viewBox="0 0 20 20"><path d="M10 6.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm0-3v2m0 9v2m6.5-6.5h-2m-9 0h-2m11-4.6-1.4 1.4M6.9 13.1l-1.4 1.4m0-9.1 1.4 1.4m6.2 6.3 1.4 1.4" /></svg>
                    }
                    @case ('file') {
                      <svg viewBox="0 0 20 20"><path d="M6 3.8h5.5L15 7.3v8.9H6zM11.5 3.8v3.5H15" /></svg>
                    }
                  }
                </span>

                <span class="item-copy">
                  <strong>
                    @for (segment of highlight(entry.item.title); track $index) {
                      <span [class.match]="segment.matched">{{ segment.text }}</span>
                    }
                  </strong>
                  <small>
                    @for (segment of highlight(entry.item.hint); track $index) {
                      <span [class.match]="segment.matched">{{ segment.text }}</span>
                    }
                  </small>
                </span>
              </button>
            }
          </div>
        </section>
      } @empty {
        <p class="palette-empty">No matching command found.</p>
      }
    </div>

    <footer class="palette-hints" aria-label="Keyboard shortcuts">
      <span><kbd>Up</kbd><kbd>Down</kbd> Navigate</span>
      <span><kbd>Enter</kbd> Select</span>
      <span><kbd>Esc</kbd> Close</span>
    </footer>
  </section>
}
