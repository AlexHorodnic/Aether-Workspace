<section class="welcome" aria-label="Aether welcome">
  <div class="aether-orb" aria-hidden="true">
    <span></span>
  </div>

  <div class="welcome-copy">
    <span>AI Studio</span>
    <h2>Welcome to Aether</h2>
    <p>Start a focused conversation, launch a reusable prompt, or connect knowledge files for a more grounded workspace.</p>
  </div>

  <div class="quick-actions" aria-label="Quick actions">
    <button type="button" class="primary" (click)="startChat()">Start new chat</button>
    <button type="button" (click)="openPrompts()">Use a prompt</button>
    <button type="button" (click)="openKnowledge()">Open knowledge base</button>
  </div>
</section>
