<div class="composer-shell">
  <div class="composer-context">
    <label for="source-scope">Answer using</label>
    <select id="source-scope" [value]="store.sourceScope().kind === 'collection' ? store.sourceScope().collection : store.sourceScope().kind" (change)="setScope($any($event.target).value)">
      <option value="all">All indexed sources</option>
      <option value="none">General knowledge only</option>
      @for (collection of knowledge.collections; track collection) {
        <option [value]="collection">{{ collection }}</option>
      }
    </select>
    <span>{{ store.sourceScopeLabel() }}</span>
  </div>
  <label class="sr-only" for="chat-message">Message Aether</label>
  <textarea
    id="chat-message"
    rows="3"
    [ngModel]="draft()"
    (ngModelChange)="updateDraft($event)"
    (keydown)="handleKeydown($event)"
    [disabled]="!localAi.ready() || localAi.busy()"
    maxlength="4000"
    placeholder="Ask Aether or query your indexed workspace sources..."
  ></textarea>
  @if (store.composerError(); as error) {
    <p class="composer-error" role="alert">{{ error }}</p>
  }
  <div class="composer-actions">
    <span>
      @if (localAi.ready()) {
        Private generation / {{ draft().length }}/4000
      } @else {
        Activate the local model above to begin
      }
    </span>
    @if (localAi.state() === 'generating') {
      <button type="button" class="stop" (click)="stop()">Stop</button>
    } @else {
      <button type="button" [disabled]="!draft().trim() || !localAi.ready() || localAi.busy()" (click)="send()">Send</button>
    }
  </div>
</div>
