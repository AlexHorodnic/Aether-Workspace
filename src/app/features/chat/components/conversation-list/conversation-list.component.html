@if (showHeader()) {
  <div class="panel-head">
    <div>
      <span>Conversations</span>
      <strong>{{ chatStore.conversations().length }} chats</strong>
    </div>
    <button type="button" (click)="createConversation()">New</button>
  </div>
}

<div class="conversation-scroll">
  @for (conversation of chatStore.conversations(); track conversation.id) {
    <article
      class="conversation"
      [class.active]="conversation.id === chatStore.selectedConversationId()"
    >
      <button type="button" class="conversation-select" (click)="selectConversation(conversation.id)">
        <span class="conversation-topline">
          <strong class="conversation-title">{{ conversation.title }}</strong>
          <time [attr.datetime]="conversation.updatedAt">{{ timestamp(conversation.updatedAt) }}</time>
        </span>
        <span class="conversation-preview">{{ preview(conversation) }}</span>
        <small>{{ conversation.messages.length }} messages</small>
      </button>
      <span class="conversation-actions">
        <button type="button" aria-label="Rename conversation" (click)="renameConversation(conversation.id, conversation.title, $event)">Rename</button>
        <button type="button" aria-label="Delete conversation" (click)="deleteConversation(conversation.id, $event)">Delete</button>
      </span>
    </article>
  } @empty {
    <div class="no-chats">
      <span aria-hidden="true"></span>
      <strong>Your studio is quiet</strong>
      <p>Create a conversation to start streaming local AI responses.</p>
      <button type="button" (click)="createConversation()">Start new chat</button>
    </div>
  }
</div>

<app-confirm-dialog
  [open]="pendingDelete() !== null"
  title="Delete conversation?"
  description="This conversation will be permanently removed from your local workspace."
  cancelLabel="Cancel"
  confirmLabel="Delete"
  (cancel)="cancelDelete()"
  (confirm)="confirmDelete()"
/>

<app-text-dialog
  [open]="pendingRename() !== null"
  title="Rename conversation"
  description="Update the title shown in your local chat history."
  label="Conversation title"
  cancelLabel="Cancel"
  confirmLabel="Save"
  [value]="pendingRename()?.title ?? ''"
  (cancel)="cancelRename()"
  (confirm)="confirmRename($event)"
/>
